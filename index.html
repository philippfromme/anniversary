<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10 YEARS — PHILIPP FROMME</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
    }
    #start-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000;
      z-index: 10;
      cursor: pointer;
      transition: opacity 1.2s ease;
    }
    #start-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #start-title {
      font-size: 18px;
      letter-spacing: 8px;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 40px;
    }
    #start-sub {
      font-size: 10px;
      letter-spacing: 4px;
      opacity: 0.3;
      text-transform: uppercase;
    }
    #start-action {
      font-size: 11px;
      letter-spacing: 6px;
      opacity: 0.5;
      text-transform: uppercase;
      margin-top: 60px;
      cursor: pointer;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    #loading {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #444;
      font-size: 10px;
      letter-spacing: 4px;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="loading">LOADING DATA...</div>
  <div id="start-overlay" style="display:none">
    <div id="start-title">PHILIPP FROMME</div>
    <div id="start-sub">10 YEARS — CAMUNDA / BPMN.IO</div>
    <div id="start-action">CLICK ANYWHERE TO BEGIN</div>
  </div>
  <canvas id="canvas"></canvas>
  <script type="module" src="/web/player.js"></script>
</body>
</html>
