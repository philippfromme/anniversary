  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>10X Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Reset ── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* ── Dieter Rams / Bauhaus ── */
      :root {
        --bg: #ffffff;
        --fg: #1a1a1a;
        --fg-secondary: #6b6b6b;
        --fg-tertiary: #a0a0a0;
        --accent: #30a14e;
        --accent-light: rgba(48, 161, 78, 0.12);
        --rule: #d0ccc6;
        --rule-light: #e5e2dd;
        --sans: "Space Mono", monospace;
        --mono: "Space Mono", monospace;
        --transition: 0.2s ease;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        background: var(--bg);
        color: var(--fg);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
      }

      canvas {
        display: block;
        position: fixed;
        inset: 0;
      }

      /* ── Loading ── */
      .loading-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: var(--bg);
        z-index: 100;
        font-size: 11px;
        font-family: var(--sans);
        font-weight: 500;
        color: var(--fg-secondary);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        transition: opacity 0.4s ease;
      }

      .loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-overlay .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--rule);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Start overlay ── */
      #start-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 50;
        transition: opacity 0.6s ease;
      }

      #start-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* GitHub-style contribution marquee background */
      .start-bg {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        overflow: hidden;
      }

      .start-grid {
        display: flex;
        flex-direction: row;
        gap: 3px;
        padding: 24px 0;
        white-space: nowrap;
        animation: marquee-scroll 60s linear infinite;
        transition: transform 1.5s ease;
      }

      @keyframes marquee-scroll {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }

      .start-grid-cell {
        width: 14px;
        height: 14px;
        border-radius: 2px;
        flex-shrink: 0;
        transition:
          height 1.5s ease,
          border-radius 1.5s ease;
      }

      .start-card {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        max-width: 80%;
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 0.8s ease,
          transform 0.8s ease;
        pointer-events: none;
      }

      .start-card.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      #start-counter {
        position: relative;
        z-index: 1;
        font-size: 72px;
        font-family: var(--sans);
        font-weight: 700;
        color: var(--fg);
        letter-spacing: -0.02em;
        transition: opacity 0.4s ease;
        animation: counter-shake 0.1s linear infinite;
        --shake: 0px;
      }

      @keyframes counter-shake {
        0% {
          transform: translate(var(--shake), var(--shake));
        }
        25% {
          transform: translate(calc(-1 * var(--shake)), var(--shake));
        }
        50% {
          transform: translate(var(--shake), calc(-1 * var(--shake)));
        }
        75% {
          transform: translate(
            calc(-1 * var(--shake)),
            calc(-1 * var(--shake))
          );
        }
        100% {
          transform: translate(var(--shake), var(--shake));
        }
      }

      #start-counter.hidden {
        opacity: 0;
      }

      #start-counter.explode {
        animation: counter-explode 0.8s ease forwards;
      }

      @keyframes counter-explode {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(20);
          opacity: 0;
        }
      }

      #start-title {
        font-size: 32px;
        font-family: var(--sans);
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--fg);
        text-align: center;
        line-height: 1.15;
      }

      #start-sub {
        font-size: 18px;
        font-family: var(--sans);
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--fg);
      }

      #start-action {
        font-size: 12px;
        font-family: var(--sans);
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #fff;
        margin-top: 32px;
        padding: 14px 36px;
        background: var(--fg);
        border: none;
        cursor: pointer;
        transition: all var(--transition);
      }

      #start-action:hover {
        background: var(--accent);
      }

      #start-action:active {
        transform: scale(0.97);
      }

      /* ── End modal ── */
      #end-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(245, 243, 240, 0.85);
        z-index: 60;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.6s ease;
      }

      #end-overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .end-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 48px 56px;
        background: #fff;
        border: 1px solid var(--rule);
        min-width: 360px;
        max-width: 480px;
      }

      .end-title {
        font-size: 13px;
        font-family: var(--sans);
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--fg-secondary);
      }

      .end-total {
        font-size: 48px;
        font-family: var(--sans);
        font-weight: 700;
        color: var(--fg);
        line-height: 1;
        letter-spacing: -0.02em;
      }

      .end-total-label {
        font-size: 11px;
        font-family: var(--sans);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--fg-tertiary);
        margin-top: -10px;
      }

      .end-repos {
        width: 100%;
        display: flex;
        flex-direction: column;
        border-top: 2px solid var(--fg);
      }

      .end-repo-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid var(--rule-light);
      }

      .end-repo-row:last-child {
        border-bottom: none;
      }

      .end-repo-rank {
        font-size: 11px;
        font-family: var(--sans);
        font-weight: 600;
        color: var(--fg-tertiary);
        width: 24px;
        flex-shrink: 0;
      }

      .end-repo-name {
        font-size: 12px;
        font-family: var(--mono);
        color: var(--fg);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .end-repo-count {
        font-size: 12px;
        font-family: var(--mono);
        font-weight: 600;
        color: var(--fg-secondary);
        margin-left: 16px;
        flex-shrink: 0;
      }

      #replay-action {
        font-size: 12px;
        font-family: var(--sans);
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #fff;
        padding: 14px 36px;
        background: var(--fg);
        border: none;
        cursor: pointer;
        transition: all var(--transition);
      }

      #replay-action:hover {
        background: var(--accent);
      }

      #replay-action:active {
        transform: scale(0.97);
      }

      .github-link {
        position: absolute;
        bottom: 24px;
        right: 24px;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px;
        background: var(--fg);
        color: #fff;
        text-decoration: none;
        cursor: pointer;
        transition:
          background var(--transition),
          transform var(--transition);
      }

      .github-link:hover {
        background: var(--accent);
      }

      .github-link:active {
        transform: scale(0.97);
      }
    </style>
